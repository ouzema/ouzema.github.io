<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#EFF6FF"/>
  <!-- Rough sketch stroke (left side) -->
  <path d="M60 280 C80 260 85 255 100 230 C112 210 108 215 125 190 C138 172 135 175 150 160" fill="none" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" opacity="0.3" stroke-dasharray="4 3"/>
  <path d="M62 282 C82 262 88 252 103 228 C115 208 110 218 128 192 C140 170 137 173 152 158" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
  <!-- Transition zone (middle) -->
  <circle cx="180" cy="150" r="4" fill="#2563EB" opacity="0.2"/>
  <circle cx="190" cy="160" r="3" fill="#2563EB" opacity="0.25"/>
  <circle cx="200" cy="145" r="3" fill="#2563EB" opacity="0.3"/>
  <!-- Clean digital line (right side) -->
  <path d="M200 140 C220 130 250 160 270 140 C290 120 310 150 340 130" fill="none" stroke="#2563EB" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Pencil shape -->
  <rect x="55" y="290" width="80" height="14" rx="3" fill="#7C3AED" opacity="0.35" transform="rotate(-45 95 297)"/>
  <path d="M45 310 L55 295 L60 300 Z" fill="#7C3AED" opacity="0.45"/>
  <!-- Digital cursor/pen (right) -->
  <circle cx="340" cy="130" r="8" fill="#2563EB" opacity="0.2"/>
  <circle cx="340" cy="130" r="3" fill="#2563EB" opacity="0.5"/>
  <!-- Arrow showing transformation -->
  <path d="M160 200 L240 200" stroke="#059669" stroke-width="2" stroke-dasharray="6 4" opacity="0.3" stroke-linecap="round"/>
  <path d="M233 194 L243 200 L233 206" fill="none" stroke="#059669" stroke-width="2" opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Decorative dots -->
  <circle cx="300" cy="250" r="20" fill="#2563EB" opacity="0.06"/>
  <circle cx="100" cy="120" r="15" fill="#7C3AED" opacity="0.06"/>
</svg>