<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#FAF5FF"/>
  <!-- Connection lines -->
  <line x1="100" y1="200" x2="200" y2="200" stroke="#7C3AED" stroke-width="3" opacity="0.3"/>
  <line x1="200" y1="200" x2="300" y2="200" stroke="#7C3AED" stroke-width="3" opacity="0.3"/>
  <!-- Arrow heads -->
  <path d="M185 194 L200 200 L185 206" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M285 194 L300 200 L285 206" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <!-- Node 1: Data -->
  <circle cx="100" cy="200" r="40" fill="#7C3AED" opacity="0.15"/>
  <circle cx="100" cy="200" r="26" fill="#7C3AED" opacity="0.35"/>
  <rect x="88" y="190" width="24" height="4" rx="2" fill="#7C3AED" opacity="0.7"/>
  <rect x="88" y="198" width="18" height="4" rx="2" fill="#7C3AED" opacity="0.7"/>
  <rect x="88" y="206" width="20" height="4" rx="2" fill="#7C3AED" opacity="0.7"/>
  <!-- Node 2: Process (gear) -->
  <circle cx="200" cy="200" r="40" fill="#2563EB" opacity="0.15"/>
  <circle cx="200" cy="200" r="26" fill="#2563EB" opacity="0.35"/>
  <circle cx="200" cy="200" r="12" fill="none" stroke="#2563EB" stroke-width="3" opacity="0.7"/>
  <circle cx="200" cy="200" r="4" fill="#2563EB" opacity="0.7"/>
  <!-- Gear teeth -->
  <rect x="196" y="183" width="8" height="6" rx="2" fill="#2563EB" opacity="0.7"/>
  <rect x="196" y="211" width="8" height="6" rx="2" fill="#2563EB" opacity="0.7"/>
  <rect x="183" y="196" width="6" height="8" rx="2" fill="#2563EB" opacity="0.7"/>
  <rect x="211" y="196" width="6" height="8" rx="2" fill="#2563EB" opacity="0.7"/>
  <!-- Node 3: Deploy -->
  <circle cx="300" cy="200" r="40" fill="#059669" opacity="0.15"/>
  <circle cx="300" cy="200" r="26" fill="#059669" opacity="0.35"/>
  <path d="M290 205 L298 213 L312 192" fill="none" stroke="#059669" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>