<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#F0FDF4"/>
  <!-- Speech bubble 1 (positive - left) -->
  <rect x="60" y="80" width="160" height="100" rx="20" fill="#059669" opacity="0.15"/>
  <rect x="60" y="80" width="160" height="100" rx="20" fill="none" stroke="#059669" stroke-width="2" opacity="0.25"/>
  <path d="M100 180 L110 200 L130 180" fill="#059669" opacity="0.15"/>
  <!-- Plus/thumbs up in bubble 1 -->
  <circle cx="140" cy="125" r="20" fill="#059669" opacity="0.2"/>
  <rect x="137" y="112" width="6" height="26" rx="3" fill="#059669" opacity="0.5"/>
  <rect x="127" y="122" width="26" height="6" rx="3" fill="#059669" opacity="0.5"/>
  <!-- Speech bubble 2 (negative - right) -->
  <rect x="180" y="210" width="160" height="100" rx="20" fill="#7C3AED" opacity="0.12"/>
  <rect x="180" y="210" width="160" height="100" rx="20" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.25"/>
  <path d="M300 310 L290 330 L270 310" fill="#7C3AED" opacity="0.12"/>
  <!-- Minus in bubble 2 -->
  <circle cx="260" cy="255" r="20" fill="#7C3AED" opacity="0.18"/>
  <rect x="247" y="252" width="26" height="6" rx="3" fill="#7C3AED" opacity="0.5"/>
  <!-- Small decorative bubbles -->
  <circle cx="320" cy="120" r="12" fill="#2563EB" opacity="0.08"/>
  <circle cx="340" cy="145" r="6" fill="#2563EB" opacity="0.06"/>
  <circle cx="80" cy="270" r="10" fill="#059669" opacity="0.06"/>
  <circle cx="65" cy="295" r="5" fill="#059669" opacity="0.05"/>
</svg>