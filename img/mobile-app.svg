<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#EFF6FF"/>
  <!-- Phone body -->
  <rect x="120" y="50" width="160" height="300" rx="24" fill="#2563EB" opacity="0.12"/>
  <rect x="120" y="50" width="160" height="300" rx="24" fill="none" stroke="#2563EB" stroke-width="2.5" opacity="0.3"/>
  <!-- Screen area -->
  <rect x="136" y="80" width="128" height="240" rx="8" fill="white" opacity="0.6"/>
  <!-- Notch -->
  <rect x="175" y="58" width="50" height="6" rx="3" fill="#2563EB" opacity="0.2"/>
  <!-- UI elements: header bar -->
  <rect x="148" y="95" width="104" height="10" rx="5" fill="#2563EB" opacity="0.2"/>
  <!-- UI: profile circle -->
  <circle cx="165" cy="135" r="14" fill="#7C3AED" opacity="0.25"/>
  <!-- UI: text lines next to profile -->
  <rect x="188" y="127" width="50" height="5" rx="2.5" fill="#2563EB" opacity="0.2"/>
  <rect x="188" y="138" width="35" height="5" rx="2.5" fill="#2563EB" opacity="0.12"/>
  <!-- UI: card block -->
  <rect x="148" y="165" width="104" height="50" rx="10" fill="#059669" opacity="0.15"/>
  <rect x="158" y="178" width="60" height="5" rx="2.5" fill="#059669" opacity="0.3"/>
  <rect x="158" y="190" width="40" height="5" rx="2.5" fill="#059669" opacity="0.2"/>
  <!-- UI: bottom action circles -->
  <circle cx="170" cy="250" r="10" fill="#2563EB" opacity="0.15"/>
  <circle cx="200" cy="250" r="10" fill="#7C3AED" opacity="0.2"/>
  <circle cx="230" cy="250" r="10" fill="#059669" opacity="0.15"/>
  <!-- Home indicator -->
  <rect x="180" y="330" width="40" height="4" rx="2" fill="#2563EB" opacity="0.2"/>
</svg>