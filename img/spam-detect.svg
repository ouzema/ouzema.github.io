<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#F0FDF4"/>
  <!-- Envelope body -->
  <rect x="70" y="140" width="220" height="150" rx="16" fill="#059669" opacity="0.15"/>
  <rect x="70" y="140" width="220" height="150" rx="16" fill="none" stroke="#059669" stroke-width="2" opacity="0.3"/>
  <!-- Envelope flap -->
  <path d="M70 156 L180 230 L290 156" fill="none" stroke="#059669" stroke-width="2" stroke-linejoin="round" opacity="0.3"/>
  <!-- Envelope lines (mail content hint) -->
  <rect x="110" y="250" width="100" height="5" rx="2.5" fill="#059669" opacity="0.12"/>
  <rect x="110" y="263" width="70" height="5" rx="2.5" fill="#059669" opacity="0.08"/>
  <!-- Shield overlay -->
  <path d="M280 100 C280 100 310 90 340 100 L340 155 C340 190 310 210 310 210 C310 210 280 190 280 155 Z" fill="#059669" opacity="0.25"/>
  <path d="M280 100 C280 100 310 90 340 100 L340 155 C340 190 310 210 310 210 C310 210 280 190 280 155 Z" fill="none" stroke="#059669" stroke-width="2" opacity="0.5"/>
  <!-- Checkmark on shield -->
  <path d="M298 150 L307 160 L324 138" fill="none" stroke="#059669" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- Small decorative circles -->
  <circle cx="100" cy="110" r="6" fill="#059669" opacity="0.1"/>
  <circle cx="80" cy="320" r="8" fill="#059669" opacity="0.08"/>
</svg>