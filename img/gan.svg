<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#FAF5FF"/>
  <!-- Left frame (original) -->
  <rect x="50" y="120" width="130" height="160" rx="16" fill="#7C3AED" opacity="0.12"/>
  <rect x="50" y="120" width="130" height="160" rx="16" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.3"/>
  <!-- Abstract "image" in left frame -->
  <circle cx="95" cy="175" r="18" fill="#7C3AED" opacity="0.2"/>
  <rect x="70" y="210" width="90" height="8" rx="4" fill="#7C3AED" opacity="0.15"/>
  <rect x="80" y="228" width="60" height="8" rx="4" fill="#7C3AED" opacity="0.1"/>
  <!-- Right frame (transformed) -->
  <rect x="220" y="120" width="130" height="160" rx="16" fill="#2563EB" opacity="0.12"/>
  <rect x="220" y="120" width="130" height="160" rx="16" fill="none" stroke="#2563EB" stroke-width="2" opacity="0.3"/>
  <!-- Abstract "image" in right frame (cleaner version) -->
  <circle cx="285" cy="175" r="18" fill="#2563EB" opacity="0.35"/>
  <rect x="245" y="210" width="80" height="8" rx="4" fill="#2563EB" opacity="0.25"/>
  <rect x="255" y="228" width="50" height="8" rx="4" fill="#2563EB" opacity="0.18"/>
  <!-- Arrow between frames -->
  <line x1="190" y1="200" x2="210" y2="200" stroke="#7C3AED" stroke-width="2.5" opacity="0.4"/>
  <path d="M205 194 L215 200 L205 206" fill="none" stroke="#7C3AED" stroke-width="2.5" opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Transformation sparkle dots -->
  <circle cx="200" cy="140" r="3" fill="#059669" opacity="0.3"/>
  <circle cx="195" cy="260" r="3" fill="#059669" opacity="0.3"/>
  <circle cx="210" cy="170" r="2" fill="#7C3AED" opacity="0.25"/>
</svg>